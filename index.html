<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Control de Días</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-brand">
        <div class="logo-icon">📋</div>
        <h1>Sistema de Control de Permisos Talleres</h1>
        <p>Administración y control de solicitudes de personal</p>
      </div>

      <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" class="form-control" placeholder="Ingrese su usuario" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña" required autocomplete="current-password">
          </div>
          <div id="loginError" class="form-error hidden" style="color: var(--danger-color, #dc3545); margin-bottom: 1rem; font-size: 0.875rem;"></div>
          
          <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%; margin-top:0.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem;">
            <span id="btnIcon">🔐</span> <span id="btnText">Ingresar al Sistema</span>
          </button>
        </form>

        <div class="demo-users">
          Proyecto Titulación 2026
        </div>
      </div>

      <div class="login-footer">
        Sistema Institucional de Control de Días &copy; 2026
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    // Ejecutar inmediatamente después de cargar las dependencias
    (() => {
      // Inicializar cliente Supabase
      SupabaseClient.init();

      // Redirigir si ya existe una sesión activa
      if (Auth.isAuthenticated()) {
        window.location.href = 'app.html';
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const submitBtn = document.getElementById('submitBtn');
      const btnIcon = document.getElementById('btnIcon');
      const btnText = document.getElementById('btnText');

      // Bloquear UI
      errorEl.classList.add('hidden');
      submitBtn.disabled = true;
      btnIcon.textContent = '⏳';
      btnText.textContent = 'Verificando credenciales...';

      try {
        const result = await Auth.login(username, password);
        
        if (result.success) {
          window.location.href = 'app.html';
        } else {
          errorEl.textContent = result.message;
          errorEl.classList.remove('hidden');
          resetSubmitButton();
        }
      } catch (error) {
        console.error('[Login Error]:', error);
        errorEl.textContent = 'Error de respuesta en el servidor de base de datos.';
        errorEl.classList.remove('hidden');
        resetSubmitButton();
      }

      function resetSubmitButton() {
        submitBtn.disabled = false;
        btnIcon.textContent = '🔐';
        btnText.textContent = 'Ingresar al Sistema';
      }
    });
  </script>
</body>
</html>
